
<!DOCTYPE html>
<html>
<head>
<title>For Drashti Singh ❤️</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  text-align:center;
  color:white;
  background: radial-gradient(circle,#120018,#000);
}

/* 🌌 3D HEART BACKGROUND */
.scene{
  position:fixed;
  width:100%;
  height:100vh;
  perspective:800px;
  z-index:-3;
}

.heart3d{
  width:140px;
  height:140px;
  background:#ff4d6d;
  position:absolute;
  top:50%;
  left:50%;
  transform-style:preserve-3d;
  transform:translate(-50%,-50%);
  animation:spin 8s linear infinite;
  box-shadow:0 0 50px #ff4d6d;
}

@keyframes spin{
  0%{transform:translate(-50%,-50%) rotateY(0deg)}
  100%{transform:translate(-50%,-50%) rotateY(360deg)}
}

/* CANVAS STARS */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-4;
}

/* SHOOTING STAR */
.star{
  position:fixed;
  width:2px;
  height:80px;
  background:linear-gradient(white,transparent);
  animation:shoot 1s linear forwards;
}

@keyframes shoot{
  from{transform:translateY(0) rotate(45deg);opacity:1}
  to{transform:translate(300px,-300px) rotate(45deg);opacity:0}
}

/* PAGES */
.page{display:none;padding-top:80px;}
.active{display:block}

/* TEXT */
h1{font-size:50px;color:#ff4d6d;}
h2{font-size:35px;color:#ff4d6d;}
p{font-size:20px}

/* BUTTON */
button{
  padding:12px 22px;
  border:none;
  border-radius:25px;
  background:#ff4d6d;
  color:white;
  font-size:18px;
  margin:10px;
}

/* HEARTS */
.heart{
  position:fixed;
  color:#ff4d6d;
  animation:float 6s linear forwards;
}
@keyframes float{
  0%{transform:translateY(100vh);opacity:0}
  20%{opacity:1}
  100%{transform:translateY(-10vh);opacity:0}
}

/* FIREWORK */
.burst{
  position:fixed;
  font-size:18px;
  animation:boom 1.2s ease-out forwards;
}
@keyframes boom{
  from{transform:translate(0,0);opacity:1}
  to{transform:translate(var(--x),var(--y));opacity:0}
}

/* NO BUTTON ESCAPE */
#noBtn{
  position:relative;
}
</style>
</head>

<body>

<!-- BACKGROUND EFFECTS -->
<div class="scene">
  <div class="heart3d"></div>
</div>

<canvas id="stars"></canvas>

<!-- MUSIC -->
<audio id="m1" src="song1.mp3"></audio>
<audio id="m2" src="song2.mp3"></audio>

<!-- PAGE 1 -->
<div class="page active" id="p1">
  <h1>Hi Drashti 💖</h1>
  <p>Something special is waiting...</p>
  <button onclick="next(2)">Start 💌</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
  <h2>I like you ❤️</h2>
  <p>You became my favourite person 💖</p>
  <button onclick="next(3)">Next ➡️</button>
</div>

<!-- PAGE 3 -->
<div class="page" id="p3">
  <h2>Will you be mine? 💍</h2>

  <button onclick="celebrate()">YES 💖</button>
  <button onclick="celebrate()">ALWAYS YES 💞</button>
  <button onclick="alert('Take your time 😊')">Maybe 🤍</button>

  <button id="noBtn" onmouseover="moveNo()">No 🙃</button>

  <h2 id="result" style="display:none">💖 SHE SAID YES 💖</h2>
</div>

<script>

/* PAGE SWITCH */
function next(n){
  document.querySelectorAll(".page").forEach(p=>{
    p.classList.remove("active");
    p.style.display="none";
  });

  let el=document.getElementById("p"+n);
  el.style.display="block";
  setTimeout(()=>el.classList.add("active"),50);
}

/* MUSIC START */
document.body.addEventListener("click",()=>{
  document.getElementById("m1").play().catch(()=>{});
},{once:true});

/* CELEBRATION */
function celebrate(){
  document.getElementById("result").style.display="block";

  document.getElementById("m1").pause();
  document.getElementById("m2").play().catch(()=>{});

  for(let i=0;i<200;i++){
    let b=document.createElement("div");
    b.className="burst";
    b.innerHTML="💖";
    b.style.left=Math.random()*100+"vw";
    b.style.top=Math.random()*100+"vh";
    b.style.setProperty('--x',(Math.random()*500-250)+"px");
    b.style.setProperty('--y',(Math.random()*500-250)+"px");
    document.body.appendChild(b);
    setTimeout(()=>b.remove(),1200);
  }
}

/* NO BUTTON MOVE */
function moveNo(){
  let b=document.getElementById("noBtn");
  b.style.position="absolute";
  b.style.left=Math.random()*80+"%";
  b.style.top=Math.random()*80+"%";
}

/* HEARTS */
setInterval(()=>{
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="❤️";
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},400);

/* SHOOTING STAR */
function shoot(){
  let s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"vw";
  s.style.top=Math.random()*100+"vh";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),1000);
}
setInterval(shoot,2000);

/* STAR CANVAS */
let c=document.getElementById("stars");
let ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let stars=[];
for(let i=0;i<120;i++){
  stars.push({x:Math.random()*c.width,y:Math.random()*c.height});
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);
  ctx.fillStyle="white";

  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,1,0,Math.PI*2);
    ctx.fill();
    s.y+=0.3;
    if(s.y>c.height)s.y=0;
  });

  requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
