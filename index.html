<!DOCTYPE html>
<html>
<head>
<title>For Drashti ❤️</title>

<style>
body{
  margin:0;
  font-family:Arial;
  overflow:hidden;
  text-align:center;
  background:black;
  color:white;
  transition:1s;
}

/* INTRO */
#intro{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

button{
  padding:12px 22px;
  border:none;
  border-radius:25px;
  background:#ff4d6d;
  color:white;
  margin:10px;
}

/* PAGES */
.page{
  display:none;
  padding-top:80px;
}

.page.active{
  display:block;
}

/* IMAGES */
.pics-container{
  height:70vh;
  overflow-y:scroll;
}
.pics-container img{
  width:90%;
  margin:20px 0;
  border-radius:20px;
}

/* VIDEO */
video{
  width:90%;
  border-radius:20px;
}

/* FINAL */
.ring{
  font-size:60px;
}

#result{
  display:none;
  font-size:40px;
}

/* FIREWORKS */
.firework{
  position:fixed;
  width:6px;
  height:6px;
  border-radius:50%;
  animation:boom 1s forwards;
}

@keyframes boom{
  to{
    transform:translate(var(--x),var(--y));
    opacity:0;
  }
}

/* ROSES */
.rose{
  position:fixed;
  top:-50px;
  font-size:22px;
  animation: fall linear forwards;
}

@keyframes fall{
  to{
    transform:translateY(110vh);
    opacity:0;
  }
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <h1>A Love Story Begins ❤️</h1>
  <button onclick="startAll()">Enter 💖</button>
</div>

<!-- MUSIC -->
<audio id="music1" src="Tera khayal.mp3"></audio>
<audio id="music2" src="duniya.mp3"></audio>
<audio id="music3" src="aahijata.mp3"></audio>

<!-- PAGE 1 -->
<div class="page active" id="p1">
  <h1>Hi Drashti 💖</h1>
  <button onclick="nextPage(2)">Start</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
  <img src="Image.png" width="250">
  <p>The day I saw you...</p>
  <button onclick="nextPage(3)">Next</button>
</div>

<!-- PAGE 3 -->
<div class="page" id="p3">
  <p id="typing"></p>
  <button onclick="nextPage('video')">Next</button>
</div>

<!-- VIDEO -->
<div class="page" id="pVideo">
  <video id="videoPlayer" controls playsinline></video>
  <button onclick="nextPage('pics')">Next</button>
</div>

<!-- INTENTIONS -->
<div class="page" id="pPics">
  <h2>My Intentions for You 💞</h2>
  <div class="pics-container" id="scrollBox">
    <img src="Dr1.jpg">
    <img src="Dr2.jpg">
    <img src="Dr3.jpg">
    <img src="Dr4.jpg">
  </div>
  <button onclick="nextPage('promise')">Next 💖</button>
</div>

<!-- PROMISE -->
<div class="page" id="pPromise">
  <h2>My Promises 💖</h2>
  <div class="pics-container" id="promiseBox">
    <img src="P1.jpg">
    <img src="P2.jpg">
    <img src="P3.jpg">
  </div>
  <button onclick="nextPage('finalVideo')">Watch 🎬</button>
</div>

<!-- FINAL VIDEO -->
<div class="page" id="pFinalVideo">
  <h2>One More Thing ❤️</h2>
  <video id="finalVideo" controls playsinline>
    <source src="D2.mp4">
  </video>
  <button onclick="nextPage(4)">Next 💍</button>
</div>

<!-- FINAL -->
<div class="page" id="p4">
  <h2>Will you be mine? 💍</h2>
  <div class="ring">💍</div>

  <button onclick="celebrate()">YES 💖</button>
  <button onclick="celebrate()">SEND YES 💞</button>
  <button id="noBtn" onmouseover="moveBtn()">NO 🙃</button>

  <h2 id="result">💖 SHE SAID YES 💖</h2>
</div>

<script>

/* VIDEO LIST */
let videos = ["D4.mp4","D5.mp4","D6.mp4","D1.mp4"];
let currentVideo = 0;

/* START */
function startAll(){
  document.getElementById("intro").style.display="none";
  let m=document.getElementById("music1");
  m.volume=0.6;
  m.play().catch(()=>{});
}

/* PAGE NAV */
function nextPage(n){

  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));

  let target;

  if(n==="video") target=document.getElementById("pVideo");
  else if(n==="pics") target=document.getElementById("pPics");
  else if(n==="promise") target=document.getElementById("pPromise");
  else if(n==="finalVideo") target=document.getElementById("pFinalVideo");
  else target=document.getElementById("p"+n);

  target.classList.add("active");

  let m1=document.getElementById("music1");
  let m2=document.getElementById("music2");
  let m3=document.getElementById("music3");

  /* SONG FLOW */
  if(n==="pics"){
    m3.volume=0.8;
    m3.play().catch(()=>{});
    startScroll("scrollBox");
  }

  if(n==="promise"){
    startScroll("promiseBox");
  }

  if(n==="video"){
    startVideo();
  }

  if(n==="finalVideo"){
    document.getElementById("finalVideo").play().catch(()=>{});
  }

  if(n===4){
    m1.pause();
    m3.pause();
    m2.volume=1;
    m2.play().catch(()=>{});
  }

  if(n===3) startTyping();
}

/* VIDEO SEQUENCE */
function startVideo(){

  let player=document.getElementById("videoPlayer");
  currentVideo=0;

  playVid(player);

  player.onended=()=>{
    currentVideo++;
    if(currentVideo < videos.length){
      playVid(player);
    }else{
      nextPage("pics");
    }
  };
}

function playVid(player){
  player.src=videos[currentVideo];
  player.load();
  player.play().catch(()=>{});
}

/* SCROLL */
function startScroll(id){
  document.querySelectorAll("#"+id+" img").forEach(img=>{
    img.style.opacity=1;
  });
}

/* TYPING */
let text="You became my favorite feeling 💖";
let i=0;

function startTyping(){
  document.getElementById("typing").innerHTML="";
  i=0;
  type();
}

function type(){
  if(i<text.length){
    document.getElementById("typing").innerHTML+=text[i++];
    setTimeout(type,40);
  }
}

/* CELEBRATION */
function celebrate(){

  document.getElementById("result").style.display="block";

  let m2=document.getElementById("music2");
  m2.play().catch(()=>{});

  startRoses();

  for(let i=0;i<300;i++){
    let f=document.createElement("div");
    f.className="firework";
    f.style.background=`hsl(${Math.random()*360},100%,60%)`;
    f.style.left=Math.random()*100+"vw";
    f.style.top=Math.random()*100+"vh";
    f.style.setProperty('--x',(Math.random()*800-400)+"px");
    f.style.setProperty('--y',(Math.random()*800-400)+"px");
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),1200);
  }
}

/* ROSES */
function startRoses(){
  setInterval(()=>{
    let r=document.createElement("div");
    r.className="rose";
    r.innerHTML="🌹";
    r.style.left=Math.random()*100+"vw";
    r.style.animationDuration=(3+Math.random()*3)+"s";
    document.body.appendChild(r);
    setTimeout(()=>r.remove(),6000);
  },300);
}

/* NO BUTTON */
function moveBtn(){
  let b=document.getElementById("noBtn");
  b.style.position="absolute";
  b.style.left=Math.random()*80+"%";
  b.style.top=Math.random()*80+"%";
}

</script>

</body>
</html>
