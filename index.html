<!DOCTYPE html>
<html>
<head>
<title>For Drashti ❤️</title>

<style>
body{
  margin:0;
  font-family:Arial;
  overflow:hidden;
  text-align:center;
  background:black;
  color:white;
  transition:1s;
}

/* intro */
#intro{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

button{
  padding:12px 22px;
  border:none;
  border-radius:25px;
  background:#ff4d6d;
  color:white;
  margin:10px;
}

/* pages */
.page{
  display:none;
  padding-top:80px;
  opacity:0;
  transform:scale(0.95);
  transition:0.6s;
}

.page.active{
  display:block;
  opacity:1;
  transform:scale(1);
}

/* reels */
.reel-container{
  height:80vh;
  overflow-y:scroll;
}

.reel{
  height:80vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.reel img{
  height:90%;
  border-radius:20px;
}

/* video */
video{
  width:90%;
  border-radius:20px;
  box-shadow:0 0 25px #ff4d6d;
}

/* pics */
.pics-container{
  height:70vh;
  overflow-y:scroll;
}

.pics-container img{
  width:90%;
  margin:20px 0;
  border-radius:20px;
  opacity:0;
  transform:translateY(50px);
  transition:1s;
}

.pics-container img.show{
  opacity:1;
  transform:translateY(0);
}

/* lyrics */
#lyrics{
  position:fixed;
  bottom:30px;
  width:100%;
  font-size:22px;
  text-shadow:0 0 15px pink;
  opacity:0;
  transition:0.5s;
}

/* fireworks */
.firework{
  position:fixed;
  width:6px;
  height:6px;
  border-radius:50%;
  animation:boom 1s forwards;
}

@keyframes boom{
  to{
    transform:translate(var(--x),var(--y));
    opacity:0;
  }
}

/* proposal */
.ring{
  font-size:60px;
  animation: floatRing 2s infinite ease-in-out;
}

@keyframes floatRing{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-20px);}
}

#result{
  display:none;
  font-size:40px;
  text-shadow:0 0 25px pink;
}

/* roses */
.rose{
  position:fixed;
  top:-50px;
  font-size:24px;
  animation: fall linear forwards;
}

@keyframes fall{
  to{
    transform:translateY(110vh);
    opacity:0;
  }
}

/* cinematic video overlay */
#videoOverlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <h1>A Love Story Begins ❤️</h1>
  <button id="enterBtn">Enter 💖</button>
</div>

<!-- MUSIC -->
<audio id="music1" src="Tera khayal.mp3"></audio>
<audio id="music2" src="duniya.mp3"></audio>
<audio id="music3" src="aahijata.mp3"></audio>

<!-- PAGE 1 -->
<div class="page active" id="p1">
  <h1>Hi Drashti 💖</h1>
  <button onclick="nextPage(2)">Start</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
  <img src="Image.png" width="300">
  <p>The day I saw you...</p>
  <button onclick="nextPage(3)">Next</button>
</div>

<!-- PAGE 3 -->
<div class="page" id="p3">
  <p id="typing"></p>
  <button onclick="nextPage('reel')">Next</button>
</div>

<!-- REELS -->
<div class="page" id="preel">
  <div class="reel-container">
    <div class="reel"><img src="Drasti1.jpg"></div>
    <div class="reel"><img src="Drasti2.jpg"></div>
    <div class="reel"><img src="Drasti4.jpg"></div>
  </div>
  <button onclick="nextPage(5)">Next</button>
</div>

<!-- VIDEO SEQUENCE -->
<div class="page" id="p5">
  <video id="videoPlayer" controls></video>
  <button onclick="nextPage('pics')">Next</button>
</div>

<!-- INTENTIONS -->
<div class="page" id="pPics">
  <h2>My Intentions for You 💞💕</h2>
  <p>⬇️ Scroll slowly ⬇️</p>
  <div id="lyrics"></div>

  <div class="pics-container" id="scrollBox">
    <img src="Dr1.jpg">
    <img src="Dr2.jpg">
    <img src="Dr3.jpg">
    <img src="Dr4.jpg">
    <img src="Dr5.jpg">
  </div>

  <button onclick="nextPage('promise')">Next 💖</button>
</div>

<!-- PROMISES -->
<div class="page" id="pPromise">
  <h2>My Promises to You 💖</h2>
  <p>⬇️ Scroll down ⬇️</p>

  <div class="pics-container" id="promiseBox">
    <img src="P1.jpg">
    <img src="P2.jpg">
    <img src="P3.jpg">
    <img src="P4.jpg">
  </div>

  <button onclick="nextPage('promiseVideo')">Watch This 🎬</button>
</div>

<!-- 🎬 CINEMATIC VIDEO -->
<div class="page" id="pPromiseVideo">
  <h2>One More Thing For You ❤️</h2>
  <video id="promiseVideo" controls playsinline>
    <source src="final.mp4" type="video/mp4">
  </video>
  <br><br>
  <button onclick="nextPage(4)">Next 💍</button>
</div>

<!-- FINAL -->
<div class="page" id="p4">
  <h2>Will you be mine? 💍</h2>
  <div class="ring">💍</div>

  <button onclick="celebrate()">YES 💖</button>
  <button onclick="celebrate()">ALWAYS YES 💞</button>
  <button id="noBtn" onmouseover="moveBtn()">No 🙃</button>

  <h2 id="result">💖 SHE SAID YES 💖</h2>
</div>

<script>

/* ENTER */
document.getElementById("enterBtn").onclick = ()=>{
  document.getElementById("intro").style.display="none";
  playMusic("music1",0.6);
};

/* PAGE SWITCH */
function nextPage(n){

  let pages=document.getElementsByClassName("page");
  for(let p of pages){ p.classList.remove("active"); }

  let target;

  if(n==="reel") target=document.getElementById("preel");
  else if(n==="pics") target=document.getElementById("pPics");
  else if(n==="promise") target=document.getElementById("pPromise");
  else if(n==="promiseVideo") target=document.getElementById("pPromiseVideo");
  else target=document.getElementById("p"+n);

  target.classList.add("active");

  stopAllMusic();

  if(n===3) startTyping();
  if(n===5) startVideoSequence();
  if(n==="pics") setTimeout(startIntentions,300);
  if(n==="promise") setTimeout(startPromiseAnimations,300);

  if(n==="promiseVideo"){
    startCinematicVideo();
  }

  if(n===1 || n===2 || n===3 || n==="reel"){
    playMusic("music1",0.6);
  }
}

/* MUSIC */
function stopAllMusic(){
  ["music1","music2","music3"].forEach(id=>{
    let m=document.getElementById(id);
    if(m){ m.pause(); m.currentTime=0; }
  });
}

function playMusic(id,vol){
  let m=document.getElementById(id);
  if(m){
    m.volume=vol;
    m.play().catch(()=>{});
  }
}

/* VIDEO SEQUENCE */
let videos=["D4.mp4","D5.mp4","D6.mp4","D1.mp4"];
let index=0;

function startVideoSequence(){
  let player=document.getElementById("videoPlayer");
  index=0;
  player.src=videos[index];
  player.play();

  player.onended=()=>{
    index++;
    if(index<videos.length){
      player.src=videos[index];
      player.play();
    }
  };
}

/* INTENTIONS */
function startIntentions(){
  playMusic("music3",0.8);

  let imgs=document.querySelectorAll("#scrollBox img");

  let observer=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        e.target.classList.add("show");
      }
    });
  });

  imgs.forEach(img=>observer.observe(img));
}

/* PROMISE ANIMATION */
function startPromiseAnimations(){
  let imgs=document.querySelectorAll("#promiseBox img");

  let observer=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        e.target.classList.add("show");
      }
    });
  });

  imgs.forEach(img=>observer.observe(img));
}

/* 🎬 CINEMATIC VIDEO */
function startCinematicVideo(){
  let v=document.getElementById("promiseVideo");

  document.body.style.background="black";

  if(v){
    v.currentTime=0;

    let playPromise=v.play();

    if(playPromise!==undefined){
      playPromise.catch(()=>{
        document.body.addEventListener("click",()=>v.play(),{once:true});
      });
    }
  }
}

/* CELEBRATION */
function celebrate(){
  document.getElementById("result").style.display="block";

  stopAllMusic();
  playMusic("music2",1);

  startRoses();

  for(let i=0;i<300;i++){
    let f=document.createElement("div");
    f.className="firework";
    f.style.background=`hsl(${Math.random()*360},100%,60%)`;
    f.style.left=Math.random()*100+"vw";
    f.style.top=Math.random()*100+"vh";
    f.style.setProperty('--x',(Math.random()*800-400)+"px");
    f.style.setProperty('--y',(Math.random()*800-400)+"px");
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),1200);
  }
}

/* ROSES */
function startRoses(){
  setInterval(()=>{
    let r=document.createElement("div");
    r.className="rose";
    r.innerHTML="🌹";
    r.style.left=Math.random()*100+"vw";
    r.style.animationDuration=(3+Math.random()*3)+"s";
    document.body.appendChild(r);
    setTimeout(()=>r.remove(),6000);
  },300);
}

/* NO BUTTON */
function moveBtn(){
  let b=document.getElementById("noBtn");
  b.style.position="absolute";
  b.style.left=Math.random()*80+"%";
  b.style.top=Math.random()*80+"%";
}

</script>

</body>
  </html>
