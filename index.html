<!DOCTYPE html>
<html>
<head>
<title>For Drashti ❤️</title>

<style>
body{
  margin:0;
  font-family:Arial;
  overflow:hidden;
  text-align:center;
  background:black;
  color:white;
}

/* 🎬 INTRO */
#intro{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
  transition:0.8s;
}

#intro h1{
  color:#ff4d6d;
  animation:fadeIn 2s forwards;
}

#intro button{
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:#ff4d6d;
  color:white;
  margin-top:20px;
  cursor:pointer;
}

/* ✨ PAGES */
.page{
  display:none;
  padding-top:80px;
  opacity:0;
  transform:scale(0.95);
  transition:all 0.8s ease;
}

.page.active{
  display:block;
  opacity:1;
  transform:scale(1);
}

/* 📸 REELS */
.reel-container{
  height:80vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

.reel{
  height:80vh;
  display:flex;
  justify-content:center;
  align-items:center;
  scroll-snap-align:start;
}

.reel img{
  height:90%;
  border-radius:20px;
  box-shadow:0 0 30px #ff4d6d;
}

/* 🎥 VIDEO */
.video-box{
  animation:zoom 1.2s ease;
}

@keyframes zoom{
  from{transform:scale(1.3);opacity:0}
  to{transform:scale(1);opacity:1}
}

/* 🌹 PETALS */
@keyframes fall{
  to{
    transform:translateY(100vh) rotate(360deg);
    opacity:0;
  }
}

/* 💥 FIREWORK */
.firework{
  position:fixed;
  width:6px;
  height:6px;
  border-radius:50%;
  background:#ff4d6d;
  animation:boom 1.2s ease-out forwards;
}

@keyframes boom{
  to{
    transform:translate(var(--x),var(--y));
    opacity:0;
  }
}

/* BUTTON */
button{
  padding:12px 22px;
  border:none;
  border-radius:25px;
  background:#ff4d6d;
  color:white;
  margin:10px;
}

@keyframes fadeIn{
  to{opacity:1}
}
</style>
</head>

<body>

<!-- 🎬 INTRO -->
<div id="intro">
  <h1>A Love Story Begins... ❤️</h1>
  <button onclick="startMovie()">Enter ❤️</button>
</div>

<!-- 🎵 MUSIC -->
<audio id="music1" src="song1.mp3"></audio>
<audio id="music2" src="song2.mp3"></audio>

<!-- PAGE 1 -->
<div class="page active" id="p1">
  <h1>Hi Drashti 💖</h1>
  <p>This is something special for you...</p>
  <button onclick="nextPage(2)">Start 💌</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
  <img src="Screenshot.png" width="300"
       onerror="this.src='https://via.placeholder.com/300'">
  <p>The day I saw you...</p>
  <button onclick="nextPage(3)">Next ➡️</button>
</div>

<!-- PAGE 3 (Typing) -->
<div class="page" id="p3">
  <p id="typing"></p>
  <button onclick="nextPage('reel')">Next ➡️</button>
</div>

<!-- 📸 REELS -->
<div class="page" id="preel">
  <h2>Memories 💖</h2>
  <div class="reel-container">
    <div class="reel"><img src="photo1.jpg"></div>
    <div class="reel"><img src="photo2.jpg"></div>
    <div class="reel"><img src="photo3.jpg"></div>
  </div>
  <button onclick="nextPage(5)">Next ➡️</button>
</div>

<!-- 🎥 VIDEO -->
<div class="page" id="p5">
  <div class="video-box">
    <video id="video" width="90%" controls>
      <source src="video.mp4" type="video/mp4">
    </video>
  </div>
  <button onclick="nextPage(4)">Next 💖</button>
</div>

<!-- 💖 FINAL -->
<div class="page" id="p4">
  <h2>Will you be mine? 💍</h2>
  <button onclick="celebrate()">YES 💖</button>
  <button onclick="celebrate()">ALWAYS YES 💞</button>
  <button id="noBtn" onmouseover="moveBtn()">No 🙃</button>

  <h2 id="result" style="display:none;">
    💖 SHE SAID YES 💖
  </h2>
</div>

<script>

/* 🎬 START */
function startMovie(){
  let intro = document.getElementById("intro");

  intro.style.opacity = "0";

  setTimeout(()=>{
    intro.style.display = "none";
  },800);

  document.getElementById("p1").classList.add("active");

  let m = document.getElementById("music1");
  m.play().catch(()=>{});
}

/* PAGE SWITCH */
function nextPage(n){

  let pages=document.getElementsByClassName("page");

  for(let i=0;i<pages.length;i++){
    pages[i].classList.remove("active");
  }

  let target;

  if(n === 'reel'){
    target = document.getElementById("preel");
  }else{
    target = document.getElementById("p"+n);
  }

  target.classList.add("active");

  if(n === 3){
    startTyping();
  }

  if(n === 5){
    let v=document.getElementById("video");
    v.play().catch(()=>{});
  }
}

/* 💌 TYPING */
let text="I don't know when it happened... but you became my favorite feeling 💖";
let i=0;

function startTyping(){
  document.getElementById("typing").innerHTML="";
  i=0;
  type();
}

function type(){
  if(i<text.length){
    document.getElementById("typing").innerHTML+=text.charAt(i);
    i++;
    setTimeout(type,40);
  }
}

/* 🌹 PETALS */
setInterval(()=>{
  let p=document.createElement("div");
  p.innerHTML="🌹";
  p.style.position="absolute";
  p.style.left=Math.random()*100+"vw";
  p.style.top="-20px";
  p.style.fontSize="20px";
  p.style.animation="fall 6s linear";
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),6000);
},300);

/* 💥 CELEBRATION */
function celebrate(){
  document.getElementById("result").style.display="block";

  document.getElementById("music1").pause();
  document.getElementById("music2").play().catch(()=>{});

  for(let i=0;i<300;i++){
    let f=document.createElement("div");
    f.className="firework";
    f.style.left=Math.random()*100+"vw";
    f.style.top=Math.random()*100+"vh";
    f.style.setProperty('--x',(Math.random()*800-400)+"px");
    f.style.setProperty('--y",(Math.random()*800-400)+"px");
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),1200);
  }
}

/* 😆 NO BUTTON RUN */
function moveBtn(){
  let b=document.getElementById("noBtn");
  b.style.position="absolute";
  b.style.left=Math.random()*80+"%";
  b.style.top=Math.random()*80+"%";
}

</script>

</body>
</html>
