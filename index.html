<!DOCTYPE html>
<html>
<head>
<title>For Drashti ❤️</title>

<style>
body{
  margin:0;
  font-family:Arial;
  overflow:hidden;
  text-align:center;
  background:black;
  color:white;
}

#intro{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

button{
  padding:12px 22px;
  border:none;
  border-radius:25px;
  background:#ff4d6d;
  color:white;
  margin:10px;
}

/* pages */
.page{
  display:none;
  padding-top:80px;
  opacity:0;
  transform:scale(0.95);
  transition:0.6s;
}

.page.active{
  display:block;
  opacity:1;
  transform:scale(1);
}

/* reels */
.reel-container{
  height:80vh;
  overflow-y:scroll;
}

.reel{
  height:80vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.reel img{
  height:90%;
  border-radius:20px;
}

/* video */
video{
  width:90%;
  border-radius:20px;
  box-shadow:0 0 25px #ff4d6d;
}

/* pics */
.pics-container{
  height:70vh;
  overflow-y:scroll;
}

.pics-container img{
  width:90%;
  margin:15px 0;
  border-radius:20px;
}

/* fireworks */
.firework{
  position:fixed;
  width:6px;
  height:6px;
  background:#ff4d6d;
  border-radius:50%;
  animation:boom 1s forwards;
}

@keyframes boom{
  to{
    transform:translate(var(--x),var(--y));
    opacity:0;
  }
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <h1>A Love Story Begins ❤️</h1>
  <button id="enterBtn">Enter 💖</button>
</div>

<!-- MUSIC -->
<audio id="music1" src="bheegi.mp3"></audio>
<audio id="music2" src="song2.mp3"></audio>
<audio id="music3" src="song3.mp3"></audio>

<!-- PAGE 1 -->
<div class="page active" id="p1">
  <h1>Hi Drashti 💖</h1>
  <button onclick="nextPage(2)">Start</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
  <img src="Image.png" width="300">
  <p>The day I saw you...</p>
  <button onclick="nextPage(3)">Next</button>
</div>

<!-- PAGE 3 -->
<div class="page" id="p3">
  <p id="typing"></p>
  <button onclick="nextPage('reel')">Next</button>
</div>

<!-- REELS -->
<div class="page" id="preel">
  <div class="reel-container">
    <div class="reel"><img src="Drasti1.jpg"></div>
    <div class="reel"><img src="Drasti2.jpg"></div>
    <div class="reel"><img src="Drasti4.jpg"></div>
  </div>
  <button onclick="nextPage(5)">Next</button>
</div>

<!-- 🎬 VIDEO SEQUENCE -->
<div class="page" id="p5">
  <video id="videoPlayer" controls></video>
  <button onclick="nextPage('pics')">Next</button>
</div>

<!-- PHOTO PAGE -->
<div class="page" id="pPics">
  <h2>My Intentions for You 💞💕</h2>
  <p>⬇️ Scroll down ⬇️</p>

  <div class="pics-container">
    <img src="Dr1.jpg">
    <img src="Dr2.jpg">
    <img src="Dr3.jpg">
    <img src="Dr4.jpg">
    <img src="Dr5.jpg">
  </div>

  <button onclick="nextPage(4)">Next 💍</button>
</div>

<!-- FINAL -->
<div class="page" id="p4">
  <h2>Will you be mine? 💍</h2>
  <button onclick="celebrate()">YES 💖</button>
  <button onclick="celebrate()">ALWAYS YES 💞</button>
  <button id="noBtn" onmouseover="moveBtn()">No 🙃</button>
  <h2 id="result" style="display:none;">💖 SHE SAID YES 💖</h2>
</div>

<script>

/* ENTER */
document.getElementById("enterBtn").onclick = ()=>{
  document.getElementById("intro").style.display="none";
  document.getElementById("music1").play().catch(()=>{});
};

/* PAGE SWITCH */
function nextPage(n){

  let pages=document.getElementsByClassName("page");
  for(let p of pages){ p.classList.remove("active"); }

  let target;

  if(n==="reel") target=document.getElementById("preel");
  else if(n==="pics") target=document.getElementById("pPics");
  else target=document.getElementById("p"+n);

  target.classList.add("active");

  if(n===3) startTyping();

  if(n===5){
    startVideoSequence();
  }
}

/* 🎬 CINEMATIC VIDEO SEQUENCE WITH FADE */
let videos = ["D4.mp4","D5.mp4","D6.mp4","D1.mp4"];
let index = 0;

function fadeVolume(audio, target){
  let step = (target - audio.volume) / 20;

  let interval = setInterval(()=>{
    audio.volume += step;

    if((step > 0 && audio.volume >= target) || (step < 0 && audio.volume <= target)){
      audio.volume = target;
      clearInterval(interval);
    }
  },100);
}

function startVideoSequence(){
  let player = document.getElementById("videoPlayer");
  let music = document.getElementById("music1");

  if(music) fadeVolume(music, 0.1);

  index = 0;
  player.src = videos[index];
  player.play().catch(()=>{});

  player.onended = ()=>{
    index++;

    if(index < videos.length){
      setTimeout(()=>{
        player.src = videos[index];
        player.play();
      },500);
    }else{
      if(music) fadeVolume(music, 1);
    }
  };
}

/* TYPING */
let text="I don't know when it happened... but you became my favorite feeling 💖";
let i=0;

function startTyping(){
  document.getElementById("typing").innerHTML="";
  i=0;
  type();
}

function type(){
  if(i<text.length){
    document.getElementById("typing").innerHTML+=text[i++];
    setTimeout(type,40);
  }
}

/* CELEBRATION */
function celebrate(){
  document.getElementById("result").style.display="block";
  document.getElementById("music2").play().catch(()=>{});

  for(let i=0;i<200;i++){
    let f=document.createElement("div");
    f.className="firework";
    f.style.left=Math.random()*100+"vw";
    f.style.top=Math.random()*100+"vh";
    f.style.setProperty('--x',(Math.random()*600-300)+"px");
    f.style.setProperty('--y',(Math.random()*600-300)+"px");
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),1000);
  }
}

/* NO BUTTON */
function moveBtn(){
  let b=document.getElementById("noBtn");
  b.style.position="absolute";
  b.style.left=Math.random()*80+"%";
  b.style.top=Math.random()*80+"%";
}

</script>

</body>
</html>
