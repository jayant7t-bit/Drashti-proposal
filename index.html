<!DOCTYPE html>
<html>
<head>
<title>For Drashti ❤️</title>

<style>
body{
  margin:0;
  font-family:Arial;
  overflow:hidden;
  text-align:center;
  background:black;
  color:white;
}

/* INTRO */
#intro{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

/* BUTTON */
button{
  padding:12px 22px;
  border:none;
  border-radius:25px;
  background:#ff4d6d;
  color:white;
  margin:10px;
}

/* PAGES */
.page{
  display:none;
  padding-top:70px;
}
.page.active{
  display:block;
}

/* VIDEO */
video{
  width:90%;
  border-radius:20px;
}

/* INTENTIONS */
.pics-container{
  height:70vh;
  overflow-y:auto;
  padding:10px;
}

.pics-container img{
  width:85%;
  margin:15px 0;
  border-radius:20px;
}

/* FINAL */
.ring{
  font-size:60px;
}

#result{
  display:none;
  font-size:40px;
}

/* FIREWORKS */
.firework{
  position:fixed;
  width:6px;
  height:6px;
  border-radius:50%;
  animation:boom 1s forwards;
}

@keyframes boom{
  to{
    transform:translate(var(--x),var(--y));
    opacity:0;
  }
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <h1>A Love Story Begins ❤️</h1>
  <button onclick="startApp()">Enter 💖</button>
</div>

<!-- MUSIC -->
<audio id="music1" src="Tera khayal.mp3"></audio>
<audio id="music2" src="duniya.mp3"></audio>
<audio id="music3" src="aahijata.mp3"></audio>

<!-- PAGE 1 -->
<div class="page active" id="p1">
  <h1>Hi Drashti 💖</h1>
  <button onclick="nextPage(2)">Start</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
  <img src="Image.png" width="250">
  <p>The day I saw you...</p>
  <button onclick="nextPage(3)">Next</button>
</div>

<!-- PAGE 3 -->
<div class="page" id="p3">
  <p id="typing"></p>
  <button onclick="nextPage('video')">Next</button>
</div>

<!-- VIDEO -->
<div class="page" id="pVideo">
  <video id="videoPlayer" controls></video>
  <button onclick="nextPage('pics')">Next</button>
</div>

<!-- INTENTIONS (FIXED) -->
<div class="page" id="pPics">
  <h2>My Intentions for You 💞</h2>
  <p>Scroll down ⬇️</p>

  <div class="pics-container" id="scrollBox">
    <img src="Dr1.jpg">
    <p>You are my peace 💖</p>

    <img src="Dr2.jpg">
    <p>You are my happiness ❤️</p>

    <img src="Dr3.jpg">
    <p>You are my forever 🌸</p>
  </div>

  <button onclick="nextPage('promise')">Next 💖</button>
</div>

<!-- PROMISE -->
<div class="page" id="pPromise">
  <h2>My Promises 💖</h2>

  <div class="pics-container">
    <img src="P1.jpg">
    <img src="P2.jpg">
    <img src="P3.jpg">
  </div>

  <button onclick="nextPage('finalVideo')">Watch 🎬</button>
</div>

<!-- FINAL VIDEO -->
<div class="page" id="pFinalVideo">
  <video id="finalVideo" controls>
    <source src="D2.mp4">
  </video>
  <button onclick="nextPage(4)">Next 💍</button>
</div>

<!-- FINAL WHATSAPP -->
<div class="page" id="p4">

  <div id="msgBox">
    <h2>💬 Sending Message...</h2>
    <button onclick="sendMsg()">Send 💌</button>
  </div>

  <div id="deliveredBox" style="display:none;">
    <h2>✔ Delivered</h2>
    <button onclick="openProposal()">Open 💍</button>
  </div>

  <div id="proposalBox" style="display:none;">
    <h2>💖 Will you be mine?</h2>

    <div class="ring">💍</div>

    <button onclick="celebrate()">YES 💖</button>
    <button onclick="celebrate()">SEND YES 💞</button>

    <button id="noBtn" onmouseover="moveBtn()">NO 🙃</button>

    <h2 id="result">💖 SHE SAID YES 💖</h2>
  </div>

</div>

<script>

let videos=["D4.mp4","D5.mp4","D6.mp4","D1.mp4"];
let vIndex=0;

/* START */
function startApp(){
  document.getElementById("intro").style.display="none";
  document.getElementById("music1").play().catch(()=>{});
}

/* NAVIGATION (CLEAN FIX) */
function nextPage(n){

  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));

  let target=document.getElementById("p"+n);

  if(n==="video") target=document.getElementById("pVideo");
  if(n==="pics") target=document.getElementById("pPics");
  if(n==="promise") target=document.getElementById("pPromise");
  if(n==="finalVideo") target=document.getElementById("pFinalVideo");

  if(target) target.classList.add("active");

  if(n===3) startTyping();
  if(n==="video") startVideo();
  if(n==="pics") playMusic3();
  if(n===4) startFinalMusic();
}

/* VIDEO */
function startVideo(){

  document.getElementById("music1").pause();
  document.getElementById("music3").pause();

  let player=document.getElementById("videoPlayer");

  vIndex=0;
  playVideo(player);

  player.onended=()=>{
    vIndex++;
    if(vIndex < videos.length){
      playVideo(player);
    } else {
      nextPage("pics");
    }
  };
}

function playVideo(player){
  player.src=videos[vIndex];
  player.load();
  player.play().catch(()=>{});
}

/* INTENTIONS MUSIC FIX */
function playMusic3(){
  let m3=document.getElementById("music3");
  m3.pause();
  m3.currentTime=0;
  m3.volume=0.8;
  m3.play().catch(()=>{});
}

/* TYPING */
let text="You became my favorite feeling 💖";
let i=0;

function startTyping(){
  document.getElementById("typing").innerHTML="";
  i=0;
  type();
}

function type(){
  if(i<text.length){
    document.getElementById("typing").innerHTML+=text[i++];
    setTimeout(type,40);
  }
}

/* FINAL MUSIC */
function startFinalMusic(){
  document.getElementById("music1").pause();
  document.getElementById("music3").pause();
  document.getElementById("music2").play().catch(()=>{});
}

/* WHATSAPP FLOW */
function sendMsg(){
  document.getElementById("msgBox").style.display="none";
  document.getElementById("deliveredBox").style.display="block";
}

function openProposal(){
  document.getElementById("deliveredBox").style.display="none";
  document.getElementById("proposalBox").style.display="block";
}

/* CELEBRATION */
function celebrate(){

  document.getElementById("result").style.display="block";

  for(let i=0;i<200;i++){
    let f=document.createElement("div");
    f.className="firework";
    f.style.background=`hsl(${Math.random()*360},100%,60%)`;
    f.style.left=Math.random()*100+"vw";
    f.style.top=Math.random()*100+"vh";
    f.style.setProperty('--x',(Math.random()*800-400)+"px");
    f.style.setProperty('--y',(Math.random()*800-400)+"px");
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),1200);
  }
}

/* NO BUTTON */
function moveBtn(){
  let b=document.getElementById("noBtn");
  b.style.position="absolute";
  b.style.left=Math.random()*80+"%";
  b.style.top=Math.random()*80+"%";
}

</script>

</body>
</html>
