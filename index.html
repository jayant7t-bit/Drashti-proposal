<!DOCTYPE html>
<html>
<head>
<title>For Drashti ❤️</title>

<style>
body{
  margin:0;
  font-family:Arial;
  overflow:hidden;
  text-align:center;
  background:black;
  color:white;
}

/* INTRO */
#intro{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

/* BUTTONS */
button{
  padding:12px 22px;
  border:none;
  border-radius:25px;
  background:#ff4d6d;
  color:white;
  margin:10px;
}

/* PAGES */
.page{
  display:none;
  padding-top:70px;
}
.page.active{
  display:block;
}

/* VIDEO */
video{
  width:90%;
  border-radius:20px;
}

/* INTENTIONS */
.pics-container{
  height:60vh;
  overflow-y:auto;
  padding:10px;
}

.pics-container img{
  width:85%;
  margin:15px 0;
  border-radius:20px;
}

/* FINAL */
.ring{
  font-size:60px;
}

#result{
  display:none;
  font-size:40px;
}

/* FIREWORKS */
.firework{
  position:fixed;
  width:6px;
  height:6px;
  border-radius:50%;
  animation:boom 1s forwards;
}

@keyframes boom{
  to{
    transform:translate(var(--x),var(--y));
    opacity:0;
  }
}

/* ROSES */
.rose{
  position:fixed;
  top:-50px;
  font-size:22px;
  animation: fall linear forwards;
}

@keyframes fall{
  to{
    transform:translateY(110vh);
    opacity:0;
  }
}

/* PHOTO TEXT */
.photoText{
  margin-top:5px;
  font-size:14px;
  opacity:0.8;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <h1>A Love Story Begins ❤️</h1>
  <button onclick="startApp()">Enter 💖</button>
</div>

<!-- MUSIC -->
<audio id="music1" src="Tera khayal.mp3"></audio>
<audio id="music2" src="duniya.mp3"></audio>
<audio id="music3" src="aahijata.mp3"></audio>

<!-- PAGE 1 -->
<div class="page active" id="p1">
  <h1>Hi Drashti 💖</h1>
  <button onclick="nextPage(2)">Start</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
  <img src="Image.png" width="250">
  <p>The day I saw you...</p>
  <button onclick="nextPage(3)">Next</button>
</div>

<!-- PAGE 3 -->
<div class="page" id="p3">
  <p id="typing"></p>
  <button onclick="nextPage('video')">Next</button>
</div>

<!-- VIDEO PAGE -->
<div class="page" id="pVideo">
  <video id="videoPlayer" controls playsinline></video>
</div>

<!-- INTENTIONS (FIXED SCROLL BUTTON ISSUE) -->
<div class="page" id="pPics">
  <h2>My Intentions for You 💞</h2>

  <p>⬇️ Scroll down ⬇️</p>

  <button onclick="enableScroll('scrollBox')">Enable Scroll 👇</button>

  <div class="pics-container" id="scrollBox" style="overflow:hidden;">
    <div>
      <img src="Dr1.jpg">
      <div class="photoText">You became my peace 💖</div>
    </div>

    <div>
      <img src="Dr2.jpg">
      <div class="photoText">My favorite feeling ❤️</div>
    </div>

    <div>
      <img src="Dr3.jpg">
      <div class="photoText">Always you 🌸</div>
    </div>
  </div>

  <button onclick="nextPage('promise')">Next 💖</button>
</div>

<!-- PROMISE -->
<div class="page" id="pPromise">
  <h2>My Promises 💖</h2>

  <div class="pics-container">
    <img src="P1.jpg">
    <img src="P2.jpg">
    <img src="P3.jpg">
  </div>

  <button onclick="nextPage('finalVideo')">Watch 🎬</button>
</div>

<!-- FINAL VIDEO -->
<div class="page" id="pFinalVideo">
  <video id="finalVideo" controls playsinline>
    <source src="D2.mp4">
  </video>
  <button onclick="nextPage(4)">Next 💍</button>
</div>

<!-- FINAL -->
<div class="page" id="p4">
  <h2>Will you be mine? 💍</h2>

  <div class="ring">💍</div>

  <button onclick="celebrate()">YES 💖</button>
  <button onclick="celebrate()">SEND YES 💞</button>

  <button id="noBtn" onmouseover="moveBtn()">NO 🙃</button>

  <h2 id="result">💖 SHE SAID YES 💖</h2>
</div>

<script>

let videos=["D4.mp4","D5.mp4","D6.mp4","D1.mp4"];
let vIndex=0;

/* START */
function startApp(){
  document.getElementById("intro").style.display="none";
  document.getElementById("music1").play().catch(()=>{});
}

/* NAVIGATION */
function nextPage(n){

  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));

  let target;

  if(n==="video") target=document.getElementById("pVideo");
  else if(n==="pics") target=document.getElementById("pPics");
  else if(n==="promise") target=document.getElementById("pPromise");
  else if(n==="finalVideo") target=document.getElementById("pFinalVideo");
  else target=document.getElementById("p"+n);

  target.classList.add("active");

  if(n===3) startTyping();
  if(n==="video") startVideo();
  if(n==="pics") document.getElementById("music3").play().catch(()=>{});
  if(n===4) startFinalMusic();
}

/* VIDEO FIX + MUSIC STOP ISSUE FIX */
function startVideo(){

  let player=document.getElementById("videoPlayer");

  // STOP MUSIC BEFORE VIDEO (IMPORTANT FIX)
  document.getElementById("music1").pause();
  document.getElementById("music3").pause();

  vIndex=0;
  playVideo(player);

  player.onended=()=>{
    vIndex++;
    if(vIndex < videos.length){
      playVideo(player);
    } else {
      nextPage("pics");
    }
  };
}

function playVideo(player){
  player.src=videos[vIndex];
  player.load();
  player.play().catch(()=>{});
}

/* ENABLE SCROLL FIX (YOUR ISSUE) */
function enableScroll(id){
  document.getElementById(id).style.overflowY="scroll";
}

/* TYPING */
let text="You became my favorite feeling 💖";
let i=0;

function startTyping(){
  document.getElementById("typing").innerHTML="";
  i=0;
  type();
}

function type(){
  if(i<text.length){
    document.getElementById("typing").innerHTML+=text[i++];
    setTimeout(type,40);
  }
}

/* FINAL MUSIC */
function startFinalMusic(){
  document.getElementById("music1").pause();
  document.getElementById("music3").pause();

  let m2=document.getElementById("music2");
  m2.volume=1;
  m2.play().catch(()=>{});
}

/* CELEBRATION */
function celebrate(){

  document.getElementById("result").style.display="block";

  startRoses();

  for(let i=0;i<250;i++){
    let f=document.createElement("div");
    f.className="firework";
    f.style.background=`hsl(${Math.random()*360},100%,60%)`;
    f.style.left=Math.random()*100+"vw";
    f.style.top=Math.random()*100+"vh";
    f.style.setProperty('--x',(Math.random()*800-400)+"px");
    f.style.setProperty('--y',(Math.random()*800-400)+"px");
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),1200);
  }
}

/* ROSES */
function startRoses(){
  setInterval(()=>{
    let r=document.createElement("div");
    r.className="rose";
    r.innerHTML="🌹";
    r.style.left=Math.random()*100+"vw";
    r.style.animationDuration=(3+Math.random()*3)+"s";
    document.body.appendChild(r);
    setTimeout(()=>r.remove(),6000);
  },300);
}

/* NO BUTTON */
function moveBtn(){
  let b=document.getElementById("noBtn");
  b.style.position="absolute";
  b.style.left=Math.random()*80+"%";
  b.style.top=Math.random()*80+"%";
}

</script>

</body>
</html>
