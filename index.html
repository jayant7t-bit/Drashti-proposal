<!DOCTYPE html>
<html>
<head>
<title>For Drashti Singh ❤️</title>

<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
  text-align:center;
  background:linear-gradient(to right,#ffd1dc,#fff);
  overflow:hidden;
}

/* Bigger text */
h1 {
  font-size:40px;
  color:#ff1e56;
  text-shadow:2px 2px 10px rgba(0,0,0,0.2);
}

h2 {
  font-size:32px;
  color:#ff1e56;
}

p {
  font-size:20px;
  font-weight:bold;
  color:#333;
}

.page {
  display:none;
  padding-top:80px;
}
.active { display:block; }

img {
  width:280px;
  border-radius:20px;
  box-shadow:0 0 25px rgba(0,0,0,0.3);
}

button {
  padding:12px 25px;
  margin:12px;
  border:none;
  border-radius:25px;
  background:#ff4d6d;
  color:white;
  font-size:18px;
  cursor:pointer;
}
button:hover { transform:scale(1.1); }

/* Hearts */
.heart {
  position:absolute;
  font-size:22px;
  animation:float 5s linear infinite;
}
@keyframes float {
  0% {transform:translateY(100vh);}
  100% {transform:translateY(-10vh);}
}

/* Fireworks */
.firework {
  position:absolute;
  width:6px;
  height:6px;
  border-radius:50%;
  animation:explode 1.5s ease-out forwards;
}
@keyframes explode {
  from {transform:translate(0,0); opacity:1;}
  to {transform:translate(var(--x), var(--y)); opacity:0;}
}
</style>

</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="music1">
  <source src="Kuch Is Tarah-Instrumental.mp3" type="audio/mp3">
</audio>

<audio id="music2">
  <source src="Kuch Is Tarah-Instrumental.mp3" type="audio/mp3">
</audio>

<!-- Page 1 -->
<div class="page active" id="p1">
  <h1>Hi Drashti Singh 💖</h1>
  <p>This is something special for you...</p>
  <button onclick="startSite()">Start 💌</button>
</div>

<!-- Page 2 -->
<div class="page" id="p2">
  <img src="Image.jpg.png">
  <p>The day I saw you outside the KV school...</p>
  <p>I fell in love with you ❤️</p>
  <button onclick="nextPage(3)">Next ➡️</button>
</div>

<!-- Page 3 -->
<div class="page" id="p3">
  <p>I don’t know when it happened...</p>
  <p>Your smile stayed in my mind...</p>
  <p>You became very special 💖</p>
  <button onclick="nextPage(4)">Next ➡️</button>
</div>

<!-- Page 4 -->
<div class="page" id="p4">
  <h2>Will you be mine? 💍</h2>

  <button onclick="celebrate()">YES 💖</button>
  <button onclick="celebrate()">ALWAYS YES 💞</button>
  <button onclick="alert('Take your time 😊')">I need sometime 🤍</button>
  <button id="noBtn" onmouseover="moveBtn()">Na ka to option hi nahi hai madam 🙃</button>

  <h2 id="result" style="display:none;color:#ff1e56;">💖 She said YES! 💖</h2>
</div>

<script>
function startSite(){
  document.getElementById("music1").play().catch(()=>{});
  nextPage(2);
}

function nextPage(n){
  var pages=document.getElementsByClassName("page");
  for(var i=0;i<pages.length;i++){
    pages[i].style.display="none";
  }
  document.getElementById("p"+n).style.display="block";
}

/* Fireworks + 2nd song */
function celebrate(){
  document.getElementById("result").style.display="block";

  let m1=document.getElementById("music1");
  let m2=document.getElementById("music2");

  m1.pause();
  m2.play().catch(()=>{});

  for(let i=0;i<150;i++){
    let f=document.createElement("div");
    f.className="firework";

    f.style.left=Math.random()*100+"vw";
    f.style.top=Math.random()*100+"vh";
    f.style.background="hsl("+Math.random()*360+",100%,50%)";

    f.style.setProperty('--x',(Math.random()*500-250)+"px");
    f.style.setProperty('--y',(Math.random()*500-250)+"px");

    document.body.appendChild(f);

    setTimeout(()=>f.remove(),1500);
  }
}

/* Moving NO button */
function moveBtn(){
  let btn=document.getElementById("noBtn");
  btn.style.position="absolute";
  btn.style.left=Math.random()*80+"%";
  btn.style.top=Math.random()*80+"%";
}

/* Background hearts */
setInterval(()=>{
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="❤️";
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);

  setTimeout(()=>h.remove(),5000);
},700);
</script>

</body>
</html>
