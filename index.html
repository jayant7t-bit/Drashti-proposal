<!DOCTYPE html>
<html>
<head>
<title>For Drashti ❤️</title>

<style>
body{
  margin:0;
  font-family:Arial;
  overflow:hidden;
  text-align:center;
  background:black;
  color:white;
}

/* INTRO */
#intro{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#intro button{
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:#ff4d6d;
  color:white;
  cursor:pointer;
}

/* PAGES */
.page{
  display:none;
  padding-top:80px;
  opacity:0;
  transform:scale(0.95);
  transition:0.6s;
}

.page.active{
  display:block;
  opacity:1;
  transform:scale(1);
}

/* REELS */
.reel-container{
  height:80vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

.reel{
  height:80vh;
  display:flex;
  justify-content:center;
  align-items:center;
  scroll-snap-align:start;
}

.reel img{
  height:90%;
  border-radius:20px;
}

/* VIDEO */
.video-box{
  animation:zoom 1s ease;
}

@keyframes zoom{
  from{transform:scale(1.2);opacity:0}
  to{transform:scale(1);opacity:1}
}

/* PHOTO PAGE */
.pics-container{
  height:70vh;
  overflow-y:scroll;
}

.pics-container img{
  width:90%;
  margin:15px 0;
  border-radius:20px;
}

/* FIREWORK */
.firework{
  position:fixed;
  width:6px;
  height:6px;
  border-radius:50%;
  background:#ff4d6d;
  animation:boom 1s ease-out forwards;
}

@keyframes boom{
  to{
    transform:translate(var(--x),var(--y));
    opacity:0;
  }
}

/* BUTTON */
button{
  padding:12px 22px;
  border:none;
  border-radius:25px;
  background:#ff4d6d;
  color:white;
  margin:10px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <h1>A Love Story Begins ❤️</h1>
  <button id="enterBtn">Enter 💖</button>
</div>

<!-- MUSIC -->
<audio id="music1" src="Bheegi Bheegi .mp3"></audio>
<audio id="music2" src="song2.mp3"></audio>
<audio id="music3" src="song3.mp3"></audio>

<!-- PAGE 1 -->
<div class="page active" id="p1">
  <h1>Hi Drashti 💖</h1>
  <button onclick="nextPage(2)">Start</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
  <img src="Image.jpg.png" width="300"
       onerror="this.src='https://via.placeholder.com/300'">
  <p>The day I saw you...</p>
  <button onclick="nextPage(3)">Next</button>
</div>

<!-- PAGE 3 -->
<div class="page" id="p3">
  <p id="typing"></p>
  <button onclick="nextPage('reel')">Next</button>
</div>

<!-- REELS -->
<div class="page" id="preel">
  <div class="reel-container">
    <div class="reel"><img src="Drasti1.jpg"></div>
    <div class="reel"><img src="Drasti2.jpg"></div>
    <div class="reel"><img src="Drasti4.jpg"></div>
  </div>
  <button onclick="nextPage(5)">Next</button>
</div>

<!-- VIDEO -->
<div class="page" id="p5">
  <div class="video-box">
    <video id="video" width="90%" controls>
      <source src="D4.mp4">
    </video>
    <source src="D5.mp4">
  </video>
    <source src="D6.mp4">
  </video>
    <source src="D1.mp4">
  </video>
  </div>
  <button onclick="nextPage('pics')">Next</button>
</div>

<!-- 📸 PHOTO PAGE -->
<div class="page" id="pPics">
  <h2>My Intentions for You 💞💕</h2>
  <p>⬇️ Scroll down ⬇️</p>

  <div class="pics-container">
    <img src="Dr1.jpg">
    <img src="Dr2.jpg">
    <img src="Dr3.jpg">
    <img src="Dr4.jpg">
    <img src="Dr5.jpg">
  </div>

  <button onclick="nextPage(4)">Next 💍</button>
</div>

<!-- FINAL -->
<div class="page" id="p4">
  <h2>Will you be mine? 💍</h2>
  <button onclick="celebrate()">YES 💖</button>
  <button onclick="celebrate()">ALWAYS YES 💞</button>
  <button id="noBtn" onmouseover="moveBtn()">No 🙃</button>

  <h2 id="result" style="display:none;">💖 SHE SAID YES 💖</h2>
</div>

<script>

/* ENTER */
document.getElementById("enterBtn").addEventListener("click",()=>{
  document.getElementById("intro").style.display="none";
  document.getElementById("music1").play().catch(()=>{});
});

/* PAGE SWITCH */
function nextPage(n){

  let pages=document.getElementsByClassName("page");
  for(let i=0;i<pages.length;i++){
    pages[i].classList.remove("active");
  }

  let target;

  if(n==="reel"){
    target=document.getElementById("preel");
  }
  else if(n==="pics"){
    target=document.getElementById("pPics");
  }
  else{
    target=document.getElementById("p"+n);
  }

  target.classList.add("active");

  let m1=document.getElementById("music1");
  let m3=document.getElementById("music3");

  if(n==="pics"){
    m1.pause();
    m3.play().catch(()=>{});
  }else{
    m3.pause();
  }

  if(n===3){
    startTyping();
  }

  if(n===5){
    document.getElementById("video").play().catch(()=>{});
  }
}

/* TYPING */
let text="I don't know when it happened... but you became my favorite feeling 💖";
let i=0;

function startTyping(){
  document.getElementById("typing").innerHTML="";
  i=0;
  type();
}

function type(){
  if(i<text.length){
    document.getElementById("typing").innerHTML+=text.charAt(i);
    i++;
    setTimeout(type,40);
  }
}

/* CELEBRATION */
function celebrate(){
  document.getElementById("result").style.display="block";

  document.getElementById("music2").play().catch(()=>{});

  for(let i=0;i<200;i++){
    let f=document.createElement("div");
    f.className="firework";
    f.style.left=Math.random()*100+"vw";
    f.style.top=Math.random()*100+"vh";
    f.style.setProperty('--x',(Math.random()*600-300)+"px");
    f.style.setProperty('--y',(Math.random()*600-300)+"px");
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),1000);
  }
}

/* NO BUTTON */
function moveBtn(){
  let b=document.getElementById("noBtn");
  b.style.position="absolute";
  b.style.left=Math.random()*80+"%";
  b.style.top=Math.random()*80+"%";
}

</script>

</body>
</html>
