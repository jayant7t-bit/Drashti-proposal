<!DOCTYPE html>
<html>
<head>
<title>For Drashti Singh ❤️</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  text-align:center;
  background: radial-gradient(circle at center,#1a0025,#000);
  color:white;
}

/* ===== 3D HEART ===== */
.scene{
  width:100%;
  height:100vh;
  perspective:800px;
  position:fixed;
  z-index:-2;
}

.heart3d{
  width:120px;
  height:120px;
  background:#ff4d6d;
  position:absolute;
  top:50%;
  left:50%;
  transform-style:preserve-3d;
  transform:translate(-50%,-50%) rotateY(0deg);
  animation:spin 6s linear infinite;
  box-shadow:0 0 40px #ff4d6d;
}

@keyframes spin{
  0%{transform:translate(-50%,-50%) rotateY(0deg)}
  100%{transform:translate(-50%,-50%) rotateY(360deg)}
}

/* STAR CANVAS */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-3;
}

/* SHOOTING STARS */
.star{
  position:fixed;
  width:2px;
  height:80px;
  background:linear-gradient(white,transparent);
  animation:shoot 1s linear forwards;
}

@keyframes shoot{
  from{transform:translateY(0) rotate(45deg);opacity:1}
  to{transform:translate(300px,-300px) rotate(45deg);opacity:0}
}

/* TEXT */
h1{font-size:50px;color:#ff4d6d;}
h2{font-size:35px;color:#ff4d6d;}
p{font-size:20px}

/* BUTTON */
button{
  padding:12px 22px;
  border:none;
  border-radius:25px;
  background:#ff4d6d;
  color:white;
  font-size:18px;
  margin:10px;
}

/* HEART BURST */
.burst{
  position:fixed;
  font-size:20px;
  animation:burst 1s ease-out forwards;
}

@keyframes burst{
  from{transform:translate(0,0);opacity:1}
  to{transform:translate(var(--x),var(--y));opacity:0}
}

/* VISUALIZER */
#bars{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:4px;
}

.bar{
  width:6px;
  height:20px;
  background:#ff4d6d;
  animation:beat 0.6s infinite alternate;
}

@keyframes beat{
  from{height:10px}
  to{height:50px}
}
</style>
</head>

<body>

<!-- 3D HEART -->
<div class="scene">
  <div class="heart3d"></div>
</div>

<!-- MUSIC -->
<audio id="m1" src="song1.mp3"></audio>
<audio id="m2" src="song2.mp3"></audio>

<!-- VISUALIZER -->
<div id="bars"></div>

<h1>Hi Drashti ❤️</h1>
<p>Welcome to your cinematic love world 💖</p>

<button onclick="shoot()">Shoot Love 💘</button>
<button onclick="celebrate()">YES 💖</button>

<script>

/* MUSIC START */
document.body.addEventListener("click",()=>{
  document.getElementById("m1").play().catch(()=>{});
},{once:true});

/* SHOOTING STAR */
function shoot(){
  let s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"vw";
  s.style.top=Math.random()*100+"vh";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),1000);

  burst();
}

/* HEART BURST */
function burst(){
  for(let i=0;i<20;i++){
    let b=document.createElement("div");
    b.className="burst";
    b.innerHTML="❤️";
    b.style.left="50%";
    b.style.top="50%";
    b.style.setProperty('--x',(Math.random()*400-200)+"px");
    b.style.setProperty('--y',(Math.random()*400-200)+"px");
    document.body.appendChild(b);
    setTimeout(()=>b.remove(),1000);
  }
}

/* FIREWORK CELEBRATION */
function celebrate(){
  document.getElementById("m1").pause();
  document.getElementById("m2").play().catch(()=>{});

  for(let i=0;i<150;i++){
    let f=document.createElement("div");
    f.className="burst";
    f.innerHTML="💖";
    f.style.left=Math.random()*100+"vw";
    f.style.top=Math.random()*100+"vh";
    f.style.setProperty('--x',(Math.random()*500-250)+"px");
    f.style.setProperty('--y',(Math.random()*500-250)+"px");
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),1200);
  }
}

/* AUDIO VISUALIZER (FAKE BEAT BARS) */
let bars=document.getElementById("bars");

for(let i=0;i<20;i++){
  let b=document.createElement("div");
  b.className="bar";
  b.style.animationDelay=(i*0.05)+"s";
  bars.appendChild(b);
}

/* AUTO SHOOTING STARS */
setInterval(()=>{
  shoot();
},1500);

</script>

</body>
</html>
