<!DOCTYPE html>
<html>
<head>
<title>For Drashti ❤️</title>

<style>
body{
  margin:0;
  font-family:Arial;
  overflow:hidden;
  text-align:center;
  background:black;
  color:white;
}

/* INTRO */
#intro{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

/* BUTTON */
button{
  padding:12px 22px;
  border:none;
  border-radius:25px;
  background:#ff4d6d;
  color:white;
  margin:10px;
}

/* PAGES */
.page{
  display:none;
  padding-top:70px;
}
.page.active{
  display:block;
}

/* INTENTIONS */
.pics-container{
  height:70vh;
  overflow-y:auto;
  padding:10px;
}

.pics-container img{
  width:85%;
  margin:15px 0;
  border-radius:20px;
}

/* FINAL PAGE */
.ring{
  font-size:60px;
  animation: float 2s infinite ease-in-out;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-15px);}
}

#result{
  display:none;
  font-size:40px;
  text-shadow:0 0 20px pink;
}

/* FIREWORKS */
.firework{
  position:fixed;
  width:6px;
  height:6px;
  border-radius:50%;
  animation:boom 1s forwards;
}

@keyframes boom{
  to{
    transform:translate(var(--x),var(--y));
    opacity:0;
  }
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <h1>A Love Story Begins ❤️</h1>
  <button onclick="startApp()">Enter 💖</button>
</div>

<!-- MUSIC -->
<audio id="music1" src="Tera khayal.mp3"></audio>
<audio id="music2" src="duniya.mp3"></audio>
<audio id="music3" src="aahijata.mp3"></audio>

<!-- PAGE 1 -->
<div class="page active" id="p1">
  <h1>Hi Drashti 💖</h1>
  <button onclick="nextPage(2)">Start</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
  <img src="Image.png" width="250">
  <p>The day I saw you...</p>
  <button onclick="nextPage(3)">Next</button>
</div>

<!-- PAGE 3 -->
<div class="page" id="p3">
  <p id="typing"></p>
  <button onclick="nextPage('video')">Next</button>
</div>

<!-- VIDEO -->
<div class="page" id="pVideo">
  <video id="videoPlayer" width="90%" controls></video>
</div>

<!-- INTENTIONS (3 PHOTOS RESTORED) -->
<div class="page" id="pPics">
  <h2>My Intentions for You 💞</h2>
  <p>Scroll down ⬇️</p>

  <div class="pics-container">
    <img src="Dr1.jpg">
    <img src="Dr2.jpg">
    <img src="Dr3.jpg">
  </div>

  <button onclick="nextPage(4)">Next 💖</button>
</div>

<!-- FINAL PAGE (ORIGINAL STYLE) -->
<div class="page" id="p4">

  <h2>Will you be mine? 💍</h2>

  <div class="ring">💍</div>

  <button onclick="celebrate()">YES 💖</button>
  <button onclick="celebrate()">ALWAYS YES 💞</button>

  <button id="noBtn" onmouseover="moveBtn()">NO 🙃</button>

  <h2 id="result">💖 SHE SAID YES 💖</h2>

</div>

<script>

/* START */
function startApp(){
  document.getElementById("intro").style.display="none";
  document.getElementById("music1").play().catch(()=>{});
}

/* NAVIGATION (FIXED CLEAN) */
function nextPage(n){

  document.querySelectorAll(".page").forEach(p=>{
    p.classList.remove("active");
  });

  let target=null;

  if(n===2) target=document.getElementById("p2");
  else if(n===3) target=document.getElementById("p3");
  else if(n==="video") target=document.getElementById("pVideo");
  else if(n===4) target=document.getElementById("p4");

  if(target) target.classList.add("active");

  if(n===3) startTyping();
  if(n==="video") startVideo();
}

/* VIDEO FLOW */
let videos=["D4.mp4","D5.mp4","D6.mp4","D1.mp4"];
let i=0;

function startVideo(){

  let v=document.getElementById("videoPlayer");
  i=0;

  play(v);

  v.onended=()=>{
    i++;
    if(i < videos.length){
      play(v);
    } else {
      nextPage(4);
    }
  };
}

function play(v){
  v.src=videos[i];
  v.play().catch(()=>{});
}

/* TYPING */
let text="You became my favorite feeling 💖";
let t=0;

function startTyping(){
  document.getElementById("typing").innerHTML="";
  t=0;
  type();
}

function type(){
  if(t < text.length){
    document.getElementById("typing").innerHTML += text[t++];
    setTimeout(type,40);
  }
}

/* CELEBRATION */
function celebrate(){

  document.getElementById("result").style.display="block";

  document.getElementById("music2").play().catch(()=>{});

  for(let i=0;i<200;i++){
    let f=document.createElement("div");
    f.className="firework";
    f.style.left=Math.random()*100+"vw";
    f.style.top=Math.random()*100+"vh";
    f.style.setProperty('--x',(Math.random()*800-400)+"px");
    f.style.setProperty('--y',(Math.random()*800-400)+"px");
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),1200);
  }
}

/* NO BUTTON */
function moveBtn(){
  let b=document.getElementById("noBtn");
  b.style.position="absolute";
  b.style.left=Math.random()*80+"%";
  b.style.top=Math.random()*80+"%";
}

</script>

</body>
</html>
